name: bench

on:
  push:
    branches: [main]
    paths: [orchestrator/models.yaml]
  workflow_dispatch:
    inputs:
      force:
        description: "Re-run all models (ignore existing results)"
        type: boolean
        default: false
      model:
        description: "Restrict to a single model (partial HF ID match, optional)"
        type: string
        default: ""

jobs:
  # ── 0a. Bootstrap: ensure results bucket exists before preflight S3 check ────
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra/orchestrator-vm
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
        run: terraform init

      - name: Ensure results bucket exists
        working-directory: infra/orchestrator-vm
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_ORGANIZATION_ID }}
          SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_PROJECT_ID }}
          TF_VAR_ssh_public_keys: '["placeholder"]'
          TF_VAR_admin_cidrs: '["127.0.0.1/32"]'
          TF_VAR_results_bucket_name: ${{ vars.SCW_BUCKET }}
        run: terraform apply -auto-approve -target=scaleway_object_bucket.results

  # ── 0b. Preflight: is there anything to bench? (S3 dedup, no VM/GPU) ─────────
  preflight:
    needs: bootstrap
    runs-on: ubuntu-latest
    outputs:
      pending: ${{ steps.count.outputs.pending }}
    defaults:
      run:
        working-directory: orchestrator
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: make setup
      - name: Count pending runs
        id: count
        env:
          API_KEY: ${{ secrets.API_KEY }}
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_BUCKET: ${{ vars.SCW_BUCKET }}
          SCW_REGION: ${{ secrets.SCW_REGION }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
          MODEL_FILTER: ${{ github.event.inputs.model || '' }}
        run: |
          PENDING=$(uv run python scripts/pending_runs.py)
          echo "pending=$PENDING" >> "$GITHUB_OUTPUT"
          echo "→ $PENDING model(s) to bench"

  # ── 1. Provision VM + deploy stack ──────────────────────────────────────────
  provision:
    needs: preflight
    if: ${{ needs.preflight.outputs.pending != '0' }}
    runs-on: ubuntu-latest
    environment: bench
    outputs:
      vm_ip: ${{ steps.tf_output.outputs.vm_ip }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra/orchestrator-vm
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
        run: terraform init

      - name: Terraform apply
        working-directory: infra/orchestrator-vm
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_ORGANIZATION_ID }}
          SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_PROJECT_ID }}
          TF_VAR_ssh_public_keys: '["${{ vars.DEPLOY_SSH_PUBLIC_KEY }}"]'
          TF_VAR_admin_cidrs: '["0.0.0.0/0"]'
          TF_VAR_results_bucket_name: ${{ vars.SCW_BUCKET }}
          TF_VAR_orchestrator_image: ${{ vars.ORCHESTRATOR_IMAGE || 'ubuntu_noble' }}
        run: terraform apply -auto-approve

      - name: Get VM IP
        id: tf_output
        working-directory: infra/orchestrator-vm
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
        run: echo "vm_ip=$(terraform output -raw public_ip)" >> "$GITHUB_OUTPUT"

      - name: Setup SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Wait for cloud-init (SSH up + Docker ready)
        env:
          VM_IP: ${{ steps.tf_output.outputs.vm_ip }}
        run: |
          echo "Waiting for SSH..."
          vm_ready=false
          for i in $(seq 1 30); do
            if ssh -vvv -o StrictHostKeyChecking=no -o ConnectTimeout=5 deploy@${VM_IP} "docker info > /dev/null 2>&1"; then
              echo "VM ready."
              ssh-keyscan -H ${VM_IP} >> ~/.ssh/known_hosts
              vm_ready=true
              break
            fi
            echo "Attempt $i/30 — retrying in 10s..."
            sleep 10
          done
          if [ "$vm_ready" != "true" ]; then
            echo "VM failed to become ready (SSH/Docker) after 30 attempts (~5 minutes)."
            exit 1
          fi

      - name: Copy repo to VM
        env:
          VM_IP: ${{ steps.tf_output.outputs.vm_ip }}
        run: |
          rsync -az --exclude='.git' --exclude='.venv' --exclude='__pycache__' \
            ./ deploy@${VM_IP}:~/llm-grill-platform/

      - name: Derive per-cycle API key
        env:
          API_KEY_SEED: ${{ secrets.API_KEY }}
        run: |
          CYCLE_API_KEY=$(.github/scripts/derive-cycle-key.sh)
          echo "::add-mask::$CYCLE_API_KEY"
          echo "CYCLE_API_KEY=$CYCLE_API_KEY" >> "$GITHUB_ENV"

      - name: Write .env on VM
        env:
          VM_IP: ${{ steps.tf_output.outputs.vm_ip }}
        run: |
          ssh deploy@${VM_IP} "cat > ~/llm-grill-platform/.env" <<EOF
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          ORCHESTRATOR_URL=http://${VM_IP}:8000
          API_KEY=${CYCLE_API_KEY}
          HF_TOKEN=${{ secrets.HF_TOKEN }}
          SCW_ACCESS_KEY=${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY=${{ secrets.SCW_SECRET_KEY }}
          SCW_DEFAULT_ORGANIZATION_ID=${{ secrets.SCW_ORGANIZATION_ID }}
          SCW_DEFAULT_PROJECT_ID=${{ secrets.SCW_PROJECT_ID }}
          SCW_BUCKET=${{ vars.SCW_BUCKET }}
          SCW_REGION=${{ secrets.SCW_REGION }}
          GPU_ZONE=${{ secrets.GPU_ZONE }}
          ADMIN_CIDRS=${{ vars.ADMIN_CIDRS || '' }}
          DEBUG=false
          EOF

      - name: Start stack (postgres + migrations + orchestrator)
        env:
          VM_IP: ${{ steps.tf_output.outputs.vm_ip }}
        run: |
          ssh deploy@${VM_IP} "
            set -e
            cd ~/llm-grill-platform
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.with-migrations.yaml \
              up --build -d postgres migration orchestrator
          "

      - name: Wait for orchestrator /health
        env:
          VM_IP: ${{ steps.tf_output.outputs.vm_ip }}
        run: |
          echo "Waiting for orchestrator..."
          orchestrator_up=false
          for i in $(seq 1 24); do
            if curl -sf --max-time 5 "http://${VM_IP}:8000/health" > /dev/null; then
              echo "Orchestrator up."
              orchestrator_up=true
              break
            fi
            echo "Attempt $i/24 — retrying in 10s..."
            sleep 10
          done
          if [ "$orchestrator_up" != "true" ]; then
            echo "Orchestrator failed to become healthy after 24 attempts (~4 minutes)."
            exit 1
          fi

  # ── 2. Run benchmarks ────────────────────────────────────────────────────────
  bench:
    needs: [preflight, provision]
    if: ${{ needs.preflight.outputs.pending != '0' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      # Same derivation as the provision job (a masked value can't cross jobs).
      - name: Derive per-cycle API key
        env:
          API_KEY_SEED: ${{ secrets.API_KEY }}
        run: |
          CYCLE_API_KEY=$(.github/scripts/derive-cycle-key.sh)
          echo "::add-mask::$CYCLE_API_KEY"
          echo "CYCLE_API_KEY=$CYCLE_API_KEY" >> "$GITHUB_ENV"

      - name: Submit runs
        env:
          VM_IP: ${{ needs.provision.outputs.vm_ip }}
          API_KEY: ${{ env.CYCLE_API_KEY }}
        run: |
          PARAMS="force=${{ github.event.inputs.force || 'false' }}"
          if [[ -n "${{ github.event.inputs.model }}" ]]; then
            PARAMS="$PARAMS&model=${{ github.event.inputs.model }}"
          fi
          curl -sf -X POST \
            -H "X-API-Key: ${API_KEY}" \
            "http://${VM_IP}:8000/bench?${PARAMS}" | tee /tmp/bench_submit.json
          echo "Submitted: $(jq '.submitted | length' /tmp/bench_submit.json) runs"

      - name: Wait for runs to complete
        env:
          VM_IP: ${{ needs.provision.outputs.vm_ip }}
        run: |
          until [[ "$(curl -sf "http://${VM_IP}:8000/bench/status" | jq '.active')" == "0" ]]; do
            echo "$(date -u +%H:%M:%S) — $(curl -sf "http://${VM_IP}:8000/bench/status" | jq -c '.counts')"
            sleep 30
          done
          echo "All runs finished."

      - name: Fail if any run failed
        env:
          VM_IP: ${{ needs.provision.outputs.vm_ip }}
        run: |
          FAILED=$(curl -sf "http://${VM_IP}:8000/bench/status" | jq '.counts.failed')
          if [[ "$FAILED" -gt 0 ]]; then
            echo "ERROR: $FAILED run(s) failed — see uploaded 'bench-diagnostics' artifact."
            exit 1
          fi

      # Captured before teardown destroys the VM. Survives as a workflow artifact.
      - name: Dump diagnostics on failure
        if: failure()
        env:
          VM_IP: ${{ needs.provision.outputs.vm_ip }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p /tmp/diagnostics
          curl -sf "http://${VM_IP}:8000/runs" | jq . > /tmp/diagnostics/runs.json || true
          curl -sf "http://${VM_IP}:8000/bench/status" | jq . > /tmp/diagnostics/bench_status.json || true
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh -o StrictHostKeyChecking=no deploy@${VM_IP} \
            "docker logs llmgrill-orchestrator --tail=500 2>&1" > /tmp/diagnostics/orchestrator.log || true
          ssh -o StrictHostKeyChecking=no deploy@${VM_IP} \
            "docker logs llmgrill-migration --tail=200 2>&1" > /tmp/diagnostics/migration.log || true

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bench-diagnostics
          path: /tmp/diagnostics
          retention-days: 14

  # ── 3. Destroy VM (always, even if bench failed) ─────────────────────────────
  teardown:
    needs: [provision, bench]
    if: always() && needs.provision.result != 'skipped'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra/orchestrator-vm
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
        run: terraform init

      - name: Terraform destroy
        working-directory: infra/orchestrator-vm
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          TF_VAR_ssh_public_keys: '["${{ vars.DEPLOY_SSH_PUBLIC_KEY }}"]'
          TF_VAR_admin_cidrs: '["0.0.0.0/0"]'
        run: |
          terraform destroy -auto-approve \
            -target=scaleway_instance_server.orchestrator \
            -target=scaleway_instance_ip.orchestrator \
            -target=scaleway_instance_security_group.orchestrator

      - name: Reap leftover GPU VMs
        if: always()
        working-directory: infra/gpu-vm
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_REGION: ${{ secrets.SCW_REGION }}
          STATE_BUCKET: llm-grill-platform-tfstate
          # Destroy reads resource attributes from state; variables are only
          # needed to satisfy required-variable / provider validation.
          TF_VAR_run_id: reaper
          TF_VAR_gpu_type: H100
          TF_VAR_instance_type: placeholder
          TF_VAR_orchestrator_url: http://127.0.0.1
          TF_VAR_hf_token: placeholder
          TF_VAR_model: placeholder
          TF_VAR_engine: vllm
          TF_VAR_scenario_path: placeholder
          TF_VAR_scenario_content: placeholder
          TF_VAR_docker_image: placeholder
        run: |
          ENDPOINT="https://s3.${SCW_REGION}.scw.cloud"
          keys=$(aws s3api list-objects-v2 --bucket "$STATE_BUCKET" --prefix gpu/ \
            --endpoint-url "$ENDPOINT" --query 'Contents[].Key' --output text 2>/dev/null || true)
          if [[ -z "$keys" || "$keys" == "None" ]]; then
            echo "No leftover GPU state — nothing to reap."
            exit 0
          fi
          for key in $keys; do
            echo "::group::Reaping $key"
            terraform init -reconfigure -input=false \
              -backend-config="bucket=$STATE_BUCKET" \
              -backend-config="key=$key" \
              -backend-config="region=$SCW_REGION" \
              -backend-config="access_key=$SCW_ACCESS_KEY" \
              -backend-config="secret_key=$SCW_SECRET_KEY"
            terraform destroy -auto-approve -input=false \
              -var "hf_token=placeholder" -var "orchestrator_api_key=placeholder"
            aws s3 rm "s3://$STATE_BUCKET/$key" --endpoint-url "$ENDPOINT"
            echo "::endgroup::"
          done
