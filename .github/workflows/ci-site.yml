name: ci-site

on:
  push:
    branches: [main]
    paths:
      - site/**
  pull_request:
    paths:
      - site/**

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run check

      - name: Build
        run: npm run build
