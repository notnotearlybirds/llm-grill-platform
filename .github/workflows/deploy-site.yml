name: deploy-site

# Builds the static SvelteKit site and deploys it to Cloudflare Pages.
# Triggers: changes under site/, or a successful `bench` run (fresh data on S3).
on:
  push:
    branches: [main]
    paths:
      - site/**
  workflow_run:
    workflows: [bench]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    # On workflow_run, only deploy when the upstream bench actually succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_DATA_BASE_URL: ${{ vars.VITE_DATA_BASE_URL }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: site
          command: pages deploy build --project-name=llm-grill-platform
