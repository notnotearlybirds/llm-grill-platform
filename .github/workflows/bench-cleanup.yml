name: bench-cleanup

on:
  workflow_run:
    workflows: [bench]
    types: [completed]

jobs:
  destroy-orphaned-gpu-vms:
    if: github.event.workflow_run.conclusion == 'cancelled'
    runs-on: ubuntu-latest

    steps:
      - name: Install Scaleway CLI
        run: |
          curl -s https://raw.githubusercontent.com/scaleway/scaleway-cli/master/scripts/get.sh | sh

      - name: Destroy all llmgrill GPU VMs
        env:
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_PROJECT_ID }}
          SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_ORGANIZATION_ID }}
          SCW_DEFAULT_REGION: ${{ secrets.SCW_REGION }}
          GPU_ZONE: ${{ secrets.GPU_ZONE }}
        run: |
          ids=$(scw instance server list zone="$GPU_ZONE" -o json \
            | jq -r '.[] | select(.name | startswith("llmgrill-")) | .id')

          if [ -z "$ids" ]; then
            echo "No orphaned llmgrill GPU VMs found."
            exit 0
          fi

          for id in $ids; do
            echo "Terminating GPU VM $id..."
            scw instance server terminate "$id" zone="$GPU_ZONE" with-ip=true with-block=true
          done
