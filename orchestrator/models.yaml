# Hardcoded list of models to benchmark.
# Add a model here and push — the CI will automatically run the benchmark on it.
# Re-run all: trigger the "bench" workflow manually with force=true.
#
# Fields:
#   model:       HuggingFace model ID (org/name)
#   engine:      vllm | llamacpp
#   size_b:      model size in billions of parameters
#   scenario:    path to scenario YAML (default: scenarios/basic_8b.yaml)
#   gguf_file:   (llamacpp only) specific GGUF filename to download

models:
  # --- Small (7-9B) ---
  - model: meta-llama/Llama-3.1-8B-Instruct
    engine: vllm
    size_b: 8

  - model: mistralai/Mistral-7B-Instruct-v0.3
    engine: vllm
    size_b: 7

  - model: Qwen/Qwen2.5-7B-Instruct
    engine: vllm
    size_b: 7

  - model: google/gemma-4-E4B-it
    engine: vllm
    size_b: 8

  # --- Medium (14-32B) ---
  - model: Qwen/Qwen2.5-14B-Instruct
    engine: vllm
    size_b: 14

  - model: microsoft/phi-4
    engine: vllm
    size_b: 14

  - model: mistralai/Mistral-Small-3.1-24B-Instruct-2503
    engine: vllm
    size_b: 24

  - model: google/gemma-4-26B-A4B-it
    engine: vllm
    size_b: 27

  # --- Large (70B+) ---
  - model: meta-llama/Llama-3.3-70B-Instruct
    engine: vllm
    size_b: 70
    scenario: scenarios/stress_70b.yaml

  - model: Qwen/Qwen2.5-72B-Instruct
    engine: vllm
    size_b: 72
    scenario: scenarios/stress_70b.yaml

  # --- Reasoning ---
  - model: deepseek-ai/DeepSeek-R1-Distill-Llama-8B
    engine: vllm
    size_b: 8

  - model: deepseek-ai/DeepSeek-R1-Distill-Qwen-32B
    engine: vllm
    size_b: 32

  - model: Qwen/QwQ-32B
    engine: vllm
    size_b: 32

  # --- llama.cpp (Q4_K_M quantized) ---
  - model: bartowski/Llama-3.2-3B-Instruct-GGUF
    engine: llamacpp
    size_b: 3
    gguf_file: Llama-3.2-3B-Instruct-Q4_K_M.gguf

  - model: bartowski/Qwen2.5-14B-Instruct-GGUF
    engine: llamacpp
    size_b: 14
    gguf_file: Qwen2.5-14B-Instruct-Q4_K_M.gguf
