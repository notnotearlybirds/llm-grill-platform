#cloud-config

write_files:
  - path: /etc/llmgrill/env
    permissions: "0600"
    content: |
      RUN_ID=${run_id}
      ORCHESTRATOR_URL=${orchestrator_url}
      HF_TOKEN=${hf_token}
      ORCHESTRATOR_API_KEY=${orchestrator_api_key}
      MODEL=${model}
      ENGINE=${engine}
      SCENARIO=/etc/llmgrill/scenario.yaml
      GGUF_FILE=${gguf_file}
      DOWNLOAD_TIMEOUT_SECONDS=${download_timeout_seconds}
      ENGINE_HEALTH_TIMEOUT_SECONDS=${engine_health_timeout_seconds}

  - path: /etc/llmgrill/scenario.yaml
    permissions: "0644"
    content: |
      ${indent(6, scenario_content)}

  - path: /etc/llmgrill/fail-report.sh
    permissions: "0755"
    content: |
      #!/bin/sh
      . /etc/llmgrill/env
      curl -sf -X POST "$${ORCHESTRATOR_URL}/runs/$${RUN_ID}/fail" \
        -H "Content-Type: application/json" \
        -H "X-API-Key: $${ORCHESTRATOR_API_KEY}" \
        -d "$(jq -n --arg msg "$1" '{error_message: $msg}')" || true

  - path: /etc/systemd/system/llmgrill-runner.service
    content: |
      [Unit]
      Description=llm-grill benchmark runner
      After=network-online.target docker.service
      Wants=network-online.target
      Requires=docker.service

      [Service]
      Type=oneshot
      ExecStart=docker run --rm --gpus all \
        --env-file /etc/llmgrill/env \
        -v /etc/llmgrill/scenario.yaml:/etc/llmgrill/scenario.yaml \
        -v /opt/models:/opt/models \
        ${docker_image}
      ExecStopPost=/bin/sh -c 'test "$SERVICE_RESULT" = "success" || /etc/llmgrill/fail-report.sh "runner exited: $SERVICE_RESULT (exit $EXIT_STATUS)"'
      StandardOutput=journal
      StandardError=journal

      [Install]
      WantedBy=multi-user.target

runcmd:
  - nvidia-smi -pm 1
  - apt-get update -y && apt-get install -y nvidia-container-toolkit jq
  - nvidia-ctk runtime configure --runtime=docker
  - systemctl restart docker
  - 'docker pull ${docker_image} || { /etc/llmgrill/fail-report.sh "docker pull failed: ${docker_image}"; exit 1; }'
  - systemctl enable --now llmgrill-runner.service
