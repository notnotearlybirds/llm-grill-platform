services:
  migration:
    container_name: llmgrill-migration
    build:
      context: .
      dockerfile: orchestrator/Dockerfile.migrations
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["uv", "run", "alembic", "upgrade", "head"]

  orchestrator:
    depends_on:
      migration:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
