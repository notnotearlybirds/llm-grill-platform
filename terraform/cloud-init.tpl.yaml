#cloud-config

write_files:
  - path: /etc/llmgrill/env
    permissions: "0600"
    content: |
      PATH=/opt/venv/bin:/usr/local/cuda/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      CUDA_HOME=/usr/local/cuda
      LD_LIBRARY_PATH=/usr/local/cuda/lib64
      RUN_ID=${run_id}
      ORCHESTRATOR_URL=${orchestrator_url}
      HF_TOKEN=${hf_token}
      ORCHESTRATOR_API_KEY=${orchestrator_api_key}
      MODEL=${model}
      ENGINE=${engine}
      SCENARIO=/etc/llmgrill/scenario.yaml
      GGUF_FILE=${gguf_file}

  - path: /etc/llmgrill/scenario.yaml
    permissions: "0644"
    content: |
      ${indent(6, scenario_content)}

  - path: /opt/runner/runner.sh
    permissions: "0755"
    content: |
      ${indent(6, runner_script)}

  - path: /etc/systemd/system/llmgrill-runner.service
    content: |
      [Unit]
      Description=llm-grill benchmark runner
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      EnvironmentFile=/etc/llmgrill/env
      ExecStart=/opt/runner/runner.sh
      StandardOutput=journal
      StandardError=journal

      [Install]
      WantedBy=multi-user.target

runcmd:
  - nvidia-smi -pm 1
  # CUDA toolkit (nvcc) — needed by vllm/flashinfer JIT kernel compilation.
  # The Scaleway GPU image already ships the NVIDIA apt repo (cudatools.gpg)
  # and a pre-created /usr/local/cuda → /usr/local/cuda-13.0 symlink, broken
  # until the toolkit is installed.
  - apt-get update -y
  - apt-get install -y jq python3-pip python3.12-venv cuda-toolkit-13-0
  - python3 -m venv /opt/venv
  - /opt/venv/bin/pip install --upgrade pip
  - /opt/venv/bin/pip install "huggingface_hub[cli]" llm-grill
%{ if engine == "vllm" ~}
  - /opt/venv/bin/pip install vllm
%{ else ~}
  - apt-get install -y git cmake build-essential libcurl4-openssl-dev
  - git clone --depth 1 --branch master https://github.com/ggml-org/llama.cpp /opt/llama.cpp
  - cmake -S /opt/llama.cpp -B /opt/llama.cpp/build -DGGML_CUDA=ON -DCMAKE_BUILD_TYPE=Release -DCMAKE_CUDA_COMPILER=/usr/local/cuda/bin/nvcc
  - cmake --build /opt/llama.cpp/build --target llama-server -j$(nproc)
  - ln -sf /opt/llama.cpp/build/bin/llama-server /usr/local/bin/llama-server
%{ endif ~}
  - systemctl enable --now llmgrill-runner.service
