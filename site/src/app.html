<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />

		<title>llm-grill · LLM inference benchmark</title>
		<meta
			name="description"
			content="Open benchmark of LLM inference servers on Scaleway GPUs — TTFT, throughput and latency under concurrency."
		/>
		<meta property="og:type" content="website" />
		<meta property="og:title" content="llm-grill · LLM inference benchmark" />
		<meta
			property="og:description"
			content="Open benchmark of LLM inference servers on Scaleway GPUs — TTFT, throughput and latency under concurrency."
		/>
		<meta property="og:url" content="https://llm-grill.fr" />
		<meta name="twitter:card" content="summary" />

		<!-- Apply the persisted theme before first paint to avoid a flash (ssr=off). -->
		<script>
			(() => {
				try {
					const t = localStorage.getItem('llm-grill-theme');
					document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : 'dark');
				} catch (_) {
					document.documentElement.setAttribute('data-theme', 'dark');
				}
			})();
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
