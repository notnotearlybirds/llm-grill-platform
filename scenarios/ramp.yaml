name: ramp
description: >
  Ramp load test: progressive concurrency on a single local backend serving a
  single model (injected via ${MODEL} substitution), with a short neutral user
  prompt. Works across model sizes — larger models will saturate earlier on the
  curve, smaller models will keep scaling up to the highest level.

backends:
  - name: local
    url: "http://localhost:8080"
    api_key: none
    type: vllm
    timeout: 120.0
    gpu_monitoring: true

models:
  - name: "${MODEL}"
    max_tokens: 256
    temperature: 0.0

conversations:
  - name: basic-prompt
    description: "Single short user prompt — neutral baseline."
    turns:
      - role: user
        content: "Explain in one paragraph what makes a good engineering manager."

targets:
  - backend: local
    model: "${MODEL}"
    conversation: basic-prompt

load:
  ramp_levels: [1, 4, 8, 16, 32, 64]
  ramp_pause_seconds: 15.0
  iterations: 2
  think_time_seconds: 0.0
